<!DOCTYPE html>
<html>
<head>
    <title>Application Form</title>
</head>
<body>

    <h1>Application Form</h1>

    <form>

        <p>
            Name:
            <input type="text">
        </p>

        <p>
            Age:
            <input type="number">
        </p>

        <p>
            Email:
            <input type="email">
        </p>

        <p>
            Password:
            <input type="password">
        </p>

        <p>
            Gender:
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </p>

        <p>
            Department:
            <select>
                <option>CSE</option>
                <option>ECE</option>
                <option>EEE</option>
                <option>Mechanical</option>
            </select>
        </p>

        <p>
            Address:
            <br>
            <textarea rows="4" cols="30"></textarea>
        </p>

        <p>
            Upload Photo:
            <input type="file">
        </p>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
